<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="login" class="container">
  <h2>Iniciar sesión</h2>
  <input id="username" placeholder="Usuario">
  <input id="password" type="password" placeholder="Clave">
  <button onclick="login()">Entrar</button>
  <p id="error"></p>
</div>

<div id="game" class="container" style="display:none">

<h1>🎰 CASINO 🎰</h1>

<div class="stats">
  💰 <span id="coins"></span>
  ⭐ <span id="points"></span>
  💵 <span id="quetzales"></span>
</div>

<div class="machine">
  <div class="column">
    <div class="cell" id="c1r1"></div>
    <div class="cell middle" id="c1r2"></div>
    <div class="cell" id="c1r3"></div>
  </div>
  <div class="column">
    <div class="cell" id="c2r1"></div>
    <div class="cell middle" id="c2r2"></div>
    <div class="cell" id="c2r3"></div>
  </div>
  <div class="column">
    <div class="cell" id="c3r1"></div>
    <div class="cell middle" id="c3r2"></div>
    <div class="cell" id="c3r3"></div>
  </div>
</div>

<button onclick="spin()">GIRAR (100)</button>
<button onclick="convertPoints()">💱 Canjear puntos</button>

<!-- 500 monedas -->
<h3>📸 Obtener 500 monedas</h3>
<a href="https://wa.me/573026782036?text=Te%20envio%20mi%20selfie%20para%20500%20monedas">
  <button>Enviar selfie</button>
</a>
<input id="key500" placeholder="Clave 500">
<button onclick="redeem500()">Canjear 500</button>

<!-- 200 monedas -->
<h3>🎤 Obtener 200 monedas</h3>
<a href="https://wa.me/573026782036?text=Te%20envio%20mi%20audio%20para%20200%20monedas">
  <button>Enviar audio</button>
</a>
<input id="key200" placeholder="Clave 200">
<button onclick="redeem200()">Canjear 200</button>

</div>

<script src="script.js"></script>
</body>
</html>
